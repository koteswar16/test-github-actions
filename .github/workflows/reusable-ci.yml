name: Reusable CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        required: false
        default: '20'
        type: string
      run-tests:
        description: Whether to run tests
        required: false
        default: true
        type: boolean
    secrets:
      NPM_TOKEN:
        description: Token for private registry
        required: false

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Configure private registry (optional)
        run: echo "npm config set //registry.npmjs.org/:_authToken=${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
